status=warn
name=RestAssuredFramework
appenders=console,file

# Root logger
rootLogger.level=info
rootLogger.appenderRefs=console,file

# Console Appender
appender.console.type=Console
appender.console.name=console
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=%d{yyyy-MM-dd HH:mm:ss} [%-5p] [%c{1}] - %m%n
appender.console.filter.threshold.type=ThresholdFilter
appender.console.filter.threshold.level=INFO

# File Appender
appender.file.type=File
appender.file.name=file
appender.file.fileName=logs/test-execution.log
appender.file.layout.type=PatternLayout
appender.file.layout.pattern=%d{yyyy-MM-dd HH:mm:ss} [%-5p] [%c{1}] - %m%n

# Logger Configuration
logger.com.qa.api.level=DEBUG
logger.com.qa.api.appenderRefs=console,file
logger.com.qa.api.additivity=false

# REST Assured Logging
logger.io.restassured.level=DEBUG
logger.io.restassured.appenderRefs=file
logger.io.restassured.additivity=false
